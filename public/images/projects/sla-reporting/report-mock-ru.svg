<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Мок интерфейса SLA-инструмента и итогового отчета</title>
  <desc id="desc">Обезличенный мокап desktop-инструмента: список сессий, журнал выполнения и пример итоговой сводки по командам.</desc>
  <rect width="1280" height="760" fill="#f7fbfc"/>
  <rect x="64" y="64" width="1152" height="632" rx="18" fill="#ffffff" stroke="#bfd1d8" stroke-width="2"/>
  <rect x="64" y="64" width="1152" height="64" rx="18" fill="#eaf4f4"/>
  <rect x="64" y="112" width="1152" height="16" fill="#eaf4f4"/>
  <circle cx="102" cy="96" r="8" fill="#0b6b66"/>
  <circle cx="130" cy="96" r="8" fill="#d4e3e7"/>
  <circle cx="158" cy="96" r="8" fill="#d4e3e7"/>
  <text x="196" y="103" fill="#0f1720" font-family="Arial, sans-serif" font-size="22" font-weight="700">Просто SLA · рабочая сессия</text>
  <text x="1028" y="103" fill="#536572" font-family="Arial, sans-serif" font-size="16">бета</text>

  <rect x="96" y="162" width="280" height="492" rx="12" fill="#fbfefe" stroke="#d9e7eb"/>
  <text x="122" y="202" fill="#0f1720" font-family="Arial, sans-serif" font-size="20" font-weight="700">Сессии</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="122" y="226" width="228" height="58" rx="8" fill="#eaf4f4" stroke="#bfd1d8"/>
    <text x="140" y="251" fill="#0f1720" font-weight="700">Q2 SLA · черновик</text>
    <text x="140" y="273" fill="#536572">мастер-сверка сохранена</text>
    <rect x="122" y="298" width="228" height="58" rx="8" fill="#ffffff" stroke="#d9e7eb"/>
    <text x="140" y="323" fill="#0f1720" font-weight="700">Q1 SLA · финал</text>
    <text x="140" y="345" fill="#536572">отчет сформирован</text>
    <rect x="122" y="370" width="228" height="58" rx="8" fill="#ffffff" stroke="#d9e7eb"/>
    <text x="140" y="395" fill="#0f1720" font-weight="700">Проверка справочников</text>
    <text x="140" y="417" fill="#536572">лог и исключения</text>
  </g>

  <rect x="412" y="162" width="772" height="492" rx="12" fill="#fbfefe" stroke="#d9e7eb"/>
  <text x="442" y="202" fill="#0f1720" font-family="Arial, sans-serif" font-size="20" font-weight="700">Итоговая сводка по командам</text>
  <text x="442" y="230" fill="#536572" font-family="Arial, sans-serif" font-size="15">Данные обезличены, значения используются только как пример структуры</text>

  <g font-family="Arial, sans-serif">
    <rect x="442" y="262" width="704" height="44" rx="8" fill="#0b6b66"/>
    <text x="470" y="290" fill="#ffffff" font-size="15" font-weight="700">Команда</text>
    <text x="650" y="290" fill="#ffffff" font-size="15" font-weight="700">Задачи</text>
    <text x="790" y="290" fill="#ffffff" font-size="15" font-weight="700">Выполнено</text>
    <text x="960" y="290" fill="#ffffff" font-size="15" font-weight="700">SLA</text>
    <text x="1050" y="290" fill="#ffffff" font-size="15" font-weight="700">Статус</text>
    <g font-size="15" fill="#33434d">
      <rect x="442" y="314" width="704" height="48" fill="#ffffff" stroke="#e2edf0"/>
      <text x="470" y="344">Команда A</text><text x="660" y="344">124</text><text x="810" y="344">119</text><text x="960" y="344">96%</text><text x="1050" y="344">OK</text>
      <rect x="442" y="362" width="704" height="48" fill="#f7fbfc" stroke="#e2edf0"/>
      <text x="470" y="392">Команда B</text><text x="660" y="392">98</text><text x="810" y="392">91</text><text x="960" y="392">93%</text><text x="1050" y="392">OK</text>
      <rect x="442" y="410" width="704" height="48" fill="#ffffff" stroke="#e2edf0"/>
      <text x="470" y="440">Команда C</text><text x="660" y="440">76</text><text x="810" y="440">68</text><text x="960" y="440">89%</text><text x="1050" y="440">проверить</text>
      <rect x="442" y="458" width="704" height="48" fill="#f7fbfc" stroke="#e2edf0"/>
      <text x="470" y="488">Итого</text><text x="660" y="488">298</text><text x="810" y="488">278</text><text x="960" y="488">93%</text><text x="1050" y="488">сформировано</text>
    </g>
  </g>

  <rect x="442" y="548" width="334" height="64" rx="10" fill="#eaf4f4" stroke="#bfd1d8"/>
  <text x="466" y="576" fill="#0b6b66" font-family="Arial, sans-serif" font-size="16" font-weight="700">Журнал</text>
  <text x="466" y="598" fill="#536572" font-family="Arial, sans-serif" font-size="14">проверка структуры, сверка, экспорт</text>
  <rect x="812" y="548" width="334" height="64" rx="10" fill="#eaf4f4" stroke="#bfd1d8"/>
  <text x="836" y="576" fill="#0b6b66" font-family="Arial, sans-serif" font-size="16" font-weight="700">Экспорт</text>
  <text x="836" y="598" fill="#536572" font-family="Arial, sans-serif" font-size="14">единый Excel-отчет по ФНО</text>
</svg>
